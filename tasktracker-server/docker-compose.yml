version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: tasktracker-postgres
    environment:
      POSTGRES_DB: tasktracker
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: tasktracker-redis
    ports:
      - "6379:6379"