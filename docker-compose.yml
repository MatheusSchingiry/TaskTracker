services:
  postgres:
    image: postgres:16
    container_name: tasktracker-db
    environment:
      POSTGRES_DB: tasktracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: tasktracker-cache
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./tasktracker-server
      dockerfile: Dockerfile
    container_name: tasktracker-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tasktracker
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./tasktracker-webclient
      dockerfile: Dockerfile
    container_name: tasktracker-web
    ports:
      - "4200:80"
    depends_on:
      - backend